name: check
on:
  push:
    branches:
      - main
  pull_request_target:
    branches:
      - main
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: ./gradlew raygun-spring-boot-starter:check raygun-spring-boot-starter:jacocoTestReport
